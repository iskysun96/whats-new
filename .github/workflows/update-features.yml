name: Update Feature Knowledge Base

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/pipeline/requirements.txt

      - name: Fetch latest CHANGELOG
        run: |
          curl -sL https://raw.githubusercontent.com/anthropics/claude-code/main/CHANGELOG.md \
            -o /tmp/changelog-latest.md
          echo "Fetched changelog ($(wc -l < /tmp/changelog-latest.md) lines)"

      - name: Extract new entries
        run: python3 scripts/pipeline/extract-new-entries.py

      - name: Check for new entries
        id: check
        run: |
          if python3 -c "import json; d=json.load(open('/tmp/new-changelog-entries.json')); exit(0 if d.get('new_versions') else 1)"; then
            echo "has_new=true" >> $GITHUB_OUTPUT
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "No new entries found. Exiting."
          fi

      - name: Classify and generate features
        if: steps.check.outputs.has_new == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/pipeline/classify-and-generate.py

      - name: Rebuild index
        if: steps.check.outputs.has_new == 'true'
        run: bash scripts/build-index.sh

      - name: Create PR if changes exist
        if: steps.check.outputs.has_new == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check for actual file changes
          if [[ -z $(git status --porcelain features/) ]]; then
            echo "No feature file changes detected."
            exit 0
          fi

          # Configure git
          git config user.name "whats-new-bot"
          git config user.email "whats-new-bot@users.noreply.github.com"

          # Create branch
          BRANCH="auto-update/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"

          # Stage and commit
          git add features/
          git commit -m "$(cat <<'EOF'
          Auto-update: New features from changelog

          Automatically generated feature entries from CHANGELOG.md changes.
          Please review for accuracy, tone, and status classification.

          Co-Authored-By: Claude Haiku <noreply@anthropic.com>
          EOF
          )"

          # Push and create PR
          git push origin "$BRANCH"

          gh pr create \
            --title "Auto-update: New features $(date +%Y-%m-%d)" \
            --body "$(cat <<'EOF'
          ## Summary
          - Automatically detected new entries in Claude Code's CHANGELOG.md
          - Classified entries as MAJOR/MINOR using Claude Haiku
          - Generated feature entries for MAJOR items using Claude Sonnet
          - Updated status for any existing features with status changes

          ## Review checklist
          - [ ] Feature descriptions are accurate
          - [ ] Status classifications are correct (ga, public-beta, private-beta)
          - [ ] Categories and tags are appropriate
          - [ ] Tone is conversational and helpful
          - [ ] No duplicate features

          🤖 Generated by the whats-new auto-update pipeline
          EOF
          )" \
            --label "auto-update"
