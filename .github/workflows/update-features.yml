name: Update Feature Knowledge Base

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/pipeline/requirements.txt

      # ──────────────────────────────────────────────
      # Source 1: Changelog-based feature detection
      # ──────────────────────────────────────────────

      - name: Fetch latest CHANGELOG
        run: |
          curl -sL https://raw.githubusercontent.com/anthropics/claude-code/main/CHANGELOG.md \
            -o /tmp/changelog-latest.md
          echo "Fetched changelog ($(wc -l < /tmp/changelog-latest.md) lines)"

      - name: Extract new entries
        run: python3 scripts/pipeline/extract-new-entries.py

      - name: Check for new entries
        id: check
        run: |
          if python3 -c "import json; d=json.load(open('/tmp/new-changelog-entries.json')); exit(0 if d.get('new_versions') else 1)"; then
            echo "has_new=true" >> $GITHUB_OUTPUT
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "No new changelog entries found."
          fi

      - name: Classify and generate from changelog
        if: steps.check.outputs.has_new == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/pipeline/classify-and-generate.py

      # ──────────────────────────────────────────────
      # Source 2: Documentation gap analysis
      # ──────────────────────────────────────────────

      - name: Scrape documentation
        run: python3 scripts/pipeline/scrape-docs.py

      - name: Run gap analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/pipeline/gap-analysis.py

      - name: Check for gaps
        id: check_gaps
        run: |
          if python3 -c "import json; d=json.load(open('/tmp/gap-report.json')); exit(0 if d.get('gaps') else 1)"; then
            echo "has_gaps=true" >> $GITHUB_OUTPUT
            echo "gap_count=$(python3 -c 'import json; print(len(json.load(open("/tmp/gap-report.json")).get("gaps", [])))')" >> $GITHUB_OUTPUT
          else
            echo "has_gaps=false" >> $GITHUB_OUTPUT
            echo "No documentation gaps found."
          fi

      - name: Generate entries for gaps
        if: steps.check_gaps.outputs.has_gaps == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/pipeline/generate-from-gaps.py

      # ──────────────────────────────────────────────
      # Finalize: rebuild, validate, open PR
      # ──────────────────────────────────────────────

      - name: Rebuild index
        if: steps.check.outputs.has_new == 'true' || steps.check_gaps.outputs.has_gaps == 'true'
        run: bash scripts/build-index.sh

      - name: Validate entries
        if: steps.check.outputs.has_new == 'true' || steps.check_gaps.outputs.has_gaps == 'true'
        run: bash scripts/validate.sh

      - name: Build coverage summary
        id: coverage
        if: always()
        run: |
          if [ -f /tmp/gap-report.json ]; then
            COVERAGE=$(python3 scripts/pipeline/coverage-summary.py)
            echo "coverage<<EOF" >> $GITHUB_OUTPUT
            echo "$COVERAGE" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "coverage=No gap report generated" >> $GITHUB_OUTPUT
          fi

      - name: Create PR if changes exist
        if: steps.check.outputs.has_new == 'true' || steps.check_gaps.outputs.has_gaps == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check for actual file changes
          if [[ -z $(git status --porcelain features/) ]]; then
            echo "No feature file changes detected."
            exit 0
          fi

          # Configure git
          git config user.name "whats-new-bot"
          git config user.email "whats-new-bot@users.noreply.github.com"

          # Create branch
          BRANCH="auto-update/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"

          # Stage and commit
          git add features/
          git commit -m "$(cat <<'COMMITEOF'
          Auto-update: New features from changelog + docs gap analysis

          Automatically generated feature entries from CHANGELOG.md changes
          and documentation gap analysis.
          Please review for accuracy, tone, and status classification.

          Co-Authored-By: Claude Haiku <noreply@anthropic.com>
          COMMITEOF
          )"

          # Push and create PR
          git push origin "$BRANCH"

          # Build gap details for PR body
          GAP_DETAILS=""
          if [ -f /tmp/gap-report.json ]; then
            GAP_DETAILS=$(python3 scripts/pipeline/gap-pr-body.py)
          fi

          gh pr create \
            --title "Auto-update: New features $(date +%Y-%m-%d)" \
            --body "$(cat <<PREOF
          ## Summary
          - Checked Claude Code CHANGELOG.md for new entries
          - Scraped 6 documentation pages for feature discovery
          - Ran gap analysis against existing feature entries
          - Generated entries for confirmed gaps using Claude Sonnet

          ## New from changelog
          $(if [ "${{ steps.check.outputs.has_new }}" = "true" ]; then echo "New changelog entries detected and classified."; else echo "No new changelog entries."; fi)

          ${GAP_DETAILS}

          ## Review checklist
          - [ ] Feature descriptions are accurate
          - [ ] Status classifications are correct (ga, public-beta, private-beta)
          - [ ] Categories and tags are appropriate
          - [ ] Detection patterns are sensible (not too broad or narrow)
          - [ ] Tone is conversational and helpful
          - [ ] No duplicate features

          🤖 Generated by the whats-new auto-update pipeline (changelog + docs gap analysis)
          PREOF
          )" \
            --label "auto-update"
